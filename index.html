<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TypeForge Ultimate</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:
radial-gradient(circle at top,#6d2aff,#12061f 65%);
color:white;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background-image:
radial-gradient(white 1px,transparent 1px);
background-size:120px 120px;
opacity:.25;
animation:stars 80s linear infinite;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

.container{
width:100%;
max-width:1200px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border-radius:30px;
padding:40px;
border:1px solid rgba(255,255,255,.12);
}

.logo{
font-size:60px;
text-align:center;
}

h1{
text-align:center;
font-size:60px;
margin-top:10px;
}

.subtitle{
text-align:center;
color:#d8c8ff;
margin-bottom:25px;
}

.stats{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:25px;
}

.stat{
background:rgba(255,255,255,.08);
padding:15px 22px;
border-radius:15px;
font-size:22px;
font-weight:600;
}

#textDisplay{
height:180px;
overflow:hidden;
background:rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
font-size:32px;
line-height:1.8;
margin-bottom:20px;
}

.correct{
color:white;
}

.incorrect{
color:#ff6b81;
}

.current{
border-bottom:3px solid white;
}

#input{
width:100%;
padding:18px;
font-size:22px;
border:none;
outline:none;
border-radius:18px;
background:rgba(255,255,255,.08);
color:white;
}

#results{
display:none;
margin-top:25px;
background:rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
}

canvas{
margin-top:20px;
background:rgba(255,255,255,.05);
border-radius:15px;
padding:10px;
}

button{
margin-top:20px;
padding:14px 35px;
border:none;
border-radius:15px;
background:linear-gradient(135deg,#ff5fe1,#8b6cff);
color:white;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">⌨️</div>

<h1>TypeForge</h1>

<p class="subtitle">
Master Speed. Build Accuracy.
</p>

<div class="stats">

<div class="stat">
⏱ <span id="timer">60</span>s
</div>

<div class="stat">
⚡ <span id="wpm">0</span> WPM
</div>

<div class="stat">
🎯 <span id="accuracy">100</span>%
</div>

<div class="stat">
❌ <span id="mistakes">0</span>
</div>

</div>

<div id="textDisplay"></div>

<input
id="input"
type="text"
placeholder="Start typing...">

<div id="results">

<h2>🏆 Results</h2>

<p id="finalWpm"></p>
<p id="finalAccuracy"></p>
<p id="finalMistakes"></p>
<p id="finalRank"></p>

<canvas id="chart"></canvas>

<button onclick="location.reload()">
Try Again 🚀
</button>

</div>
<script>

const words = [

"technology","future","innovation","coding","learning",
"artificial","intelligence","computer","keyboard","speed",
"accuracy","consistency","practice","success","discipline",
"growth","development","science","creative","logical",
"python","javascript","university","education","machine",
"network","database","algorithm","challenge","opportunity",
"knowledge","progress","achievement","confidence","focus",
"productivity","engineering","software","hardware","typing"

];

let text = "";
let timer = 60;
let started = false;
let interval = null;
let mistakes = 0;
let history = [];

const textDisplay =
document.getElementById("textDisplay");

const input =
document.getElementById("input");

function generateWords(){

text = "";

for(let i=0;i<25;i++){

text +=
words[
Math.floor(
Math.random()*words.length
)
] + " ";

}

textDisplay.innerHTML =
text
.split("")
.map(char =>
`<span>${char}</span>`
)
.join("");

}

generateWords();

input.addEventListener(
"input",
handleTyping
);

function handleTyping(){

if(!started){

started = true;

startTimer();

}

const typed =
input.value;

const chars =
textDisplay.querySelectorAll("span");

let correct = 0;

mistakes = 0;

chars.forEach(
(char,index)=>{

const current =
typed[index];

if(current == null){

char.className = "";

}

else if(
current ===
char.innerText
){

char.className =
"correct";

correct++;

}

else{

char.className =
"incorrect";

mistakes++;

}

});

if(
chars[typed.length]
){

chars[
typed.length
].classList.add(
"current"
);

}

const accuracy =
typed.length === 0
? 100
: Math.round(
(correct /
typed.length)
*100
);

document
.getElementById("accuracy")
.innerText =
accuracy;

document
.getElementById("mistakes")
.innerText =
mistakes;

}

function startTimer(){

interval =
setInterval(()=>{

timer--;

document
.getElementById("timer")
.innerText =
timer;

const wordsTyped =
input.value
.trim()
.split(/\s+/)
.filter(
word => word !== ""
)
.length;

const elapsed =
(60 - timer) / 60;

const currentWpm =
elapsed > 0
? Math.round(
wordsTyped /
elapsed
)
: 0;

document
.getElementById("wpm")
.innerText =
currentWpm;

history.push(
currentWpm
);

if(timer <= 0){

clearInterval(
interval
);

finishTest();

}

},1000);

}

function finishTest(){

input.disabled =
true;

const finalWpm =
document
.getElementById("wpm")
.innerText;

const finalAccuracy =
document
.getElementById("accuracy")
.innerText;

let rank =
"🌱 Beginner";

if(finalWpm >= 60){

rank =
"🚀 Expert";

}
else if(
finalWpm >= 40
){

rank =
"🔥 Advanced";

}
else if(
finalWpm >= 25
){

rank =
"👍 Intermediate";

}

document
.getElementById("results")
.style.display =
"block";

document
.getElementById("finalWpm")
.innerHTML =
"<b>⚡ WPM:</b> "
+ finalWpm;

document
.getElementById("finalAccuracy")
.innerHTML =
"<b>🎯 Accuracy:</b> "
+ finalAccuracy + "%";

document
.getElementById("finalMistakes")
.innerHTML =
"<b>❌ Mistakes:</b> "
+ mistakes;

document
.getElementById("finalRank")
.innerHTML =
"<b>🏆 Rank:</b> "
+ rank;

new Chart(

document
.getElementById("chart"),

{

type:"line",

data:{

labels:
history.map(
(_,i)=>i+1
),

datasets:[{

label:"WPM",

data:history,

borderColor:"#ff5fe1",

backgroundColor:
"rgba(255,95,225,.2)",

fill:true,

tension:.4

}]

},

options:{

responsive:true,

plugins:{

legend:{

labels:{
color:"white"
}

}

},

scales:{

x:{

ticks:{
color:"white"
}

},

y:{

ticks:{
color:"white"
}

}

}

}

}

);

}

</script>

</body>
</html>
