<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TypeForge</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
radial-gradient(circle at top,#6d2aff,#12061f 70%);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
overflow-x:hidden;
color:white;
}

body::before{
content:"";
position:fixed;
inset:0;
background-image:
radial-gradient(white 1px,transparent 1px);
background-size:120px 120px;
opacity:.18;
animation:stars 90s linear infinite;
pointer-events:none;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(-1200px);}
}

.container{
width:100%;
max-width:1100px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border-radius:30px;
padding:40px;
border:1px solid rgba(255,255,255,.1);
}

.logo{
font-size:60px;
text-align:center;
}

h1{
text-align:center;
font-size:60px;
margin:10px 0;
}

.subtitle{
text-align:center;
color:#d8c8ff;
margin-bottom:30px;
}

.stats{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:25px;
}

.stat{
background:rgba(255,255,255,.08);
padding:15px 22px;
border-radius:15px;
font-size:20px;
font-weight:600;
}

#sentence{
background:rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
font-size:32px;
line-height:1.8;
margin-bottom:20px;
min-height:140px;
}

.correct{
color:white;
}

.wrong{
color:#ff6b81;
}

.current{
background:white;
color:black;
border-radius:4px;
}

#input{
width:100%;
padding:18px;
font-size:22px;
border:none;
outline:none;
border-radius:18px;
background:rgba(255,255,255,.08);
color:white;
}

#results{
display:none;
margin-top:25px;
background:rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
}

#results h2{
margin-bottom:15px;
}

canvas{
margin-top:20px;
background:rgba(255,255,255,.05);
border-radius:15px;
padding:10px;
}

button{
margin-top:20px;
padding:14px 35px;
border:none;
border-radius:15px;
background:linear-gradient(135deg,#ff5fe1,#8b6cff);
color:white;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">⌨️</div>

<h1>TypeForge</h1>

<p class="subtitle">
Master Speed. Build Accuracy.
</p>

<div class="stats">

<div class="stat">
⏱ <span id="time">60</span>s
</div>

<div class="stat">
⚡ <span id="wpm">0</span>
</div>

<div class="stat">
🎯 <span id="accuracy">100</span>%
</div>

<div class="stat">
❌ <span id="mistakes">0</span>
</div>

</div>

<div id="sentence"></div>

<input
id="input"
type="text"
placeholder="Start typing here...">

<div id="results">

<h2>🏆 Results</h2>

<p id="finalWpm"></p>
<p id="finalAccuracy"></p>
<p id="finalMistakes"></p>

<canvas id="chart"></canvas>

<button onclick="location.reload()">
Try Again 🚀
</button>

</div>

</div>

<script>

const sentences = [

"Practice every day and your typing speed will improve naturally.",

"Artificial intelligence is transforming technology across the world.",

"Consistency is more important than perfection when learning skills.",

"Reading books expands knowledge and strengthens imagination.",

"Success comes from discipline effort and patience over time.",

"Programming teaches logical thinking and problem solving abilities.",

"Small improvements every day create remarkable long term results.",

"Learning new skills expands opportunities and builds confidence."

];

let selected =
sentences[
Math.floor(
Math.random()*sentences.length
)
];

const sentenceDiv =
document.getElementById("sentence");

sentenceDiv.innerHTML =
selected
.split("")
.map(letter =>
`<span>${letter}</span>`
)
.join("");

let timer = 60;
let started = false;
let mistakes = 0;
let history = [];
let interval;

const input =
document.getElementById("input");

input.addEventListener(
"input",
function(){

if(!started){

started = true;

interval =
setInterval(()=>{

timer--;

document
.getElementById("time")
.innerText = timer;

const elapsed =
60 - timer;

const wordsTyped =
input.value
.trim()
.split(" ")
.filter(x=>x!="")
.length;

const currentWpm =
elapsed > 0
? Math.round(
(wordsTyped*60)/elapsed
)
: 0;

document
.getElementById("wpm")
.innerText =
currentWpm;

history.push(
currentWpm
);

if(timer<=0){

finishTest();

}

},1000);

}

const typed =
input.value;

const spans =
sentenceDiv
.querySelectorAll("span");

let correct = 0;

mistakes = 0;

spans.forEach(
(span,index)=>{

const char =
typed[index];

if(char==null){

span.className="";

}

else if(
char===span.innerText
){

span.className="correct";

correct++;

}

else{

span.className="wrong";

mistakes++;

}

});

if(
spans[typed.length]
){

spans[
typed.length
].classList.add(
"current"
);

}

let accuracy =
typed.length===0
?100
:Math.round(
(correct/typed.length)*100
);

document
.getElementById("accuracy")
.innerText =
accuracy;

document
.getElementById("mistakes")
.innerText =
mistakes;

if(
typed === selected
){

finishTest();

}

});

function finishTest(){

clearInterval(
interval
);

input.disabled =
true;

document
.getElementById("results")
.style.display =
"block";

document
.getElementById("finalWpm")
.innerHTML =
"<b>⚡ WPM:</b> "
+
document.getElementById("wpm").innerText;

document
.getElementById("finalAccuracy")
.innerHTML =
"<b>🎯 Accuracy:</b> "
+
document.getElementById("accuracy").innerText
+
"%";

document
.getElementById("finalMistakes")
.innerHTML =
"<b>❌ Mistakes:</b> "
+
mistakes;

new Chart(

document
.getElementById("chart"),

{
type:"line",

data:{
labels:
history.map(
(_,i)=>i+1
),

datasets:[{
label:"WPM",
data:history,
borderColor:"#ff5fe1",
backgroundColor:"rgba(255,95,225,.2)",
fill:true,
tension:.4
}]
},

options:{
responsive:true
}

}

);

}

</script>

</body>
</html>
