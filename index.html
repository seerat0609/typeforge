<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TypeForge Ultimate</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top,#6d2aff,#12061f 65%);
color:white;
}

/* STARS */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background-image:
radial-gradient(white 1px,transparent 1px),
radial-gradient(white 1px,transparent 1px);
background-size:
120px 120px,
220px 220px;
opacity:.35;
animation:moveStars 100s linear infinite;
}

@keyframes moveStars{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

.orb{
position:absolute;
border-radius:50%;
filter:blur(70px);
opacity:.4;
z-index:-1;
}

.orb1{
width:280px;
height:280px;
background:#ff4fd8;
left:5%;
top:10%;
animation:float 12s infinite ease-in-out;
}

.orb2{
width:320px;
height:320px;
background:#6d2aff;
right:5%;
bottom:10%;
animation:float 15s infinite ease-in-out;
}

@keyframes float{
50%{
transform:translateY(-50px);
}
}

.container{
width:95%;
max-width:1200px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border-radius:30px;
padding:40px;
border:1px solid rgba(255,255,255,.15);
}

.logo{
font-size:65px;
text-align:center;
margin-bottom:10px;
}

h1{
text-align:center;
font-size:60px;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#d9c7ff;
margin-bottom:25px;
}

.topStats{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
}

.stat{
background:rgba(255,255,255,.08);
padding:15px 25px;
border-radius:15px;
font-size:20px;
font-weight:600;
}

#textDisplay{
background:rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
font-size:30px;
line-height:1.8;
min-height:180px;
margin-bottom:20px;
}

.correct{
color:white;
}

.incorrect{
color:#ff5b6e;
}

.current{
border-bottom:3px solid white;
}

#input{
width:100%;
padding:20px;
font-size:22px;
border:none;
outline:none;
border-radius:20px;
background:rgba(255,255,255,.08);
color:white;
}

#results{
display:none;
margin-top:30px;
background:rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
}

#results h2{
margin-bottom:20px;
}

canvas{
margin-top:20px;
background:rgba(255,255,255,.05);
border-radius:20px;
padding:10px;
}

button{
margin-top:20px;
padding:15px 35px;
border:none;
border-radius:15px;
background:linear-gradient(135deg,#ff5fe1,#8b6cff);
color:white;
font-size:18px;
font-weight:600;
cursor:pointer;
}

</style>
</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">

<div class="logo">⌨️</div>

<h1>TypeForge</h1>

<p class="subtitle">
Master Speed. Build Accuracy.
</p>

<div class="topStats">

<div class="stat">
⏱ Time:
<span id="timer">60</span>
</div>

<div class="stat">
⚡ WPM:
<span id="wpm">0</span>
</div>

<div class="stat">
🎯 Accuracy:
<span id="accuracy">100</span>%
</div>

<div class="stat">
❌ Mistakes:
<span id="mistakes">0</span>
</div>

</div>

<div id="textDisplay"></div>

<input
id="input"
type="text"
placeholder="Start typing...">

<div id="results">

<h2>🏆 Test Complete</h2>

<p id="finalWpm"></p>
<p id="finalAccuracy"></p>
<p id="finalMistakes"></p>
<p id="badge"></p>

<canvas id="chart"></canvas>

<button onclick="location.reload()">
Try Again 🚀
</button>

</div>

</div>
