<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⌨️ TypeForge</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow-x:hidden;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
color:white;
background:
radial-gradient(circle at top,#6d2aff,#12061f 60%);
}

/* STARS */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px,transparent 1px),
radial-gradient(white 1px,transparent 1px);
background-size:
120px 120px,
200px 200px;
animation:starsMove 80s linear infinite;
opacity:.4;
pointer-events:none;
}

@keyframes starsMove{
from{
transform:translateY(0);
}
to{
transform:translateY(-800px);
}
}

/* ORBS */

.orb{
position:fixed;
border-radius:50%;
filter:blur(60px);
opacity:.45;
z-index:-1;
animation:float 12s ease-in-out infinite;
}

.orb1{
width:250px;
height:250px;
background:#ff4fd8;
top:10%;
left:5%;
}

.orb2{
width:300px;
height:300px;
background:#6d2aff;
bottom:10%;
right:5%;
animation-delay:3s;
}

@keyframes float{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-40px);
}
}

.container{
width:100%;
max-width:1000px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.15);
border-radius:30px;
padding:40px;
box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.logo{
font-size:70px;
text-align:center;
margin-bottom:10px;
animation:bob 4s ease-in-out infinite;
}

@keyframes bob{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-12px);
}
}

h1{
text-align:center;
font-size:55px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#d9c7ff;
margin-bottom:25px;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:25px;
}

.stat{
background:rgba(255,255,255,.08);
padding:12px 20px;
border-radius:15px;
font-weight:600;
}

.passage{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:20px;
font-size:20px;
line-height:1.8;
margin-bottom:20px;
}

textarea{
width:100%;
height:180px;
border:none;
outline:none;
border-radius:20px;
padding:20px;
font-size:17px;
background:rgba(255,255,255,.08);
color:white;
resize:none;
margin-bottom:20px;
}

textarea::placeholder{
color:#d9c7ff;
}

.result{
display:none;
margin-top:25px;
background:rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
animation:slideUp .5s ease;
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.result h2{
margin-bottom:15px;
font-size:34px;
}

.result p{
margin-bottom:10px;
font-size:18px;
}

.correct{
color:#7CFFB2;
}

</style>

</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">

<div class="logo">⌨️</div>

<h1>TypeForge</h1>

<p class="subtitle">
Master Speed. Build Accuracy.
</p>

<div class="stats">

<div class="stat">
⚡ WPM:
<span id="wpmLive">0</span>
</div>

<div class="stat">
🎯 Accuracy:
<span id="accuracyLive">100</span>%
</div>

<div class="stat">
❌ Mistakes:
<span id="mistakesLive">0</span>
</div>

</div>

<div
class="passage"
id="passage">
</div>

<textarea
id="input"
placeholder="Start typing here...">
</textarea>

<div
class="result"
id="result">

<h2>🏆 Results</h2>

<p id="finalWpm"></p>
<p id="finalAccuracy"></p>
<p id="finalMistakes"></p>
<p id="finalRating"></p>

</div>

</div>

<script>

const passages=[

"Learning new skills expands opportunities and builds confidence.",

"Technology continues to transform the world around us every day.",

"Programming combines creativity and logical thinking together.",

"Success is built through consistency discipline and hard work.",

"Artificial intelligence is shaping the future of innovation."

];

const passage=
passages[
Math.floor(
Math.random()*passages.length
)
];

document
.getElementById("passage")
.innerText=
passage;

let started=false;
let startTime=0;

const input=
document.getElementById("input");

input.addEventListener(
"input",
function(){

const typed=
input.value;

if(!started){

started=true;
startTime=Date.now();

}

let correct=0;

for(
let i=0;
i<typed.length;
i++
){

if(
typed[i]===
passage[i]
){

correct++;

}

}

const mistakes=
typed.length-correct;

const accuracy=
typed.length===0
?100
:Math.round(
(correct/typed.length)*100
);

const minutes=
(Date.now()-startTime)
/60000;

const words=
typed.trim().split(/\s+/).length;

const wpm=
minutes>0
?Math.round(words/minutes)
:0;

document
.getElementById("wpmLive")
.innerText=
wpm;

document
.getElementById("accuracyLive")
.innerText=
accuracy;

document
.getElementById("mistakesLive")
.innerText=
mistakes;

if(
typed===passage
){

finishTest(
wpm,
accuracy,
mistakes
);

}

}
);

function finishTest(
wpm,
accuracy,
mistakes
){

let rating=
"Beginner";

if(wpm>=60){

rating=
"Expert 🚀";

}
else if(wpm>=40){

rating=
"Advanced 🔥";

}
else if(wpm>=25){

rating=
"Intermediate 👍";

}

document
.getElementById("finalWpm")
.innerHTML=
"<b>WPM:</b> "+wpm;

document
.getElementById("finalAccuracy")
.innerHTML=
"<b>Accuracy:</b> "+accuracy+"%";

document
.getElementById("finalMistakes")
.innerHTML=
"<b>Mistakes:</b> "+mistakes;

document
.getElementById("finalRating")
.innerHTML=
"<b>Rating:</b> "+rating;

document
.getElementById("result")
.style.display=
"block";

input.disabled=true;

}

</script>

</body>

</html>
